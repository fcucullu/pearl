name: Daily Phase Check & Partner Notify

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check phase changes and send partner emails
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "https://pearl.franciscocucullu.com/api/cron/phase-check" -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" -H "Content-Type: application/json")
          BODY=$(cat /tmp/response.txt)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
