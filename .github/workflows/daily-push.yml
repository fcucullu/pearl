name: Daily Push Notification

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send push notifications
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "https://pearl.franciscocucullu.com/api/push/notify")
          BODY=$(cat /tmp/response.txt)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
