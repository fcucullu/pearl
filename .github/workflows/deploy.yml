name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Run Supabase migrations
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if Supabase is configured
        id: check
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Supabase not configured, skipping migrations"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.skip != 'true'
        with:
          version: latest

      - name: Link Supabase project
        if: steps.check.outputs.skip != 'true'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push database migrations
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          set +e
          OUTPUT=$(supabase db push --include-all 2>&1)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "$OUTPUT"
          elif echo "$OUTPUT" | grep -q "migration repair"; then
            echo "Creating placeholders for missing migrations..."
            VERSIONS=$(echo "$OUTPUT" | grep -oE '[0-9]{3}' | sort -u)
            for v in $VERSIONS; do
              if ! ls supabase/migrations/${v}* 2>/dev/null | grep -q .; then
                touch "supabase/migrations/${v}_.sql"
                echo "  Created placeholder: ${v}_.sql"
              fi
            done
            supabase db push --include-all
          else
            echo "$OUTPUT"
            exit $EXIT_CODE
          fi

      - name: Configure Supabase auth URLs and Google OAuth
        if: steps.check.outputs.skip != 'true'
        run: |
          SUBDOMAIN="${{ secrets.APP_SUBDOMAIN }}"
          DOMAIN="${{ secrets.CLOUDFLARE_DOMAIN }}"
          if [ -z "$SUBDOMAIN" ]; then SUBDOMAIN="goldenlist"; fi
          if [ -z "$DOMAIN" ]; then DOMAIN="franciscocucullu.com"; fi
          SITE_URL="https://${SUBDOMAIN}.${DOMAIN}"

          # Fetch existing redirect URLs and append this app's URLs
          EXISTING=$(curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/config/auth" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('uri_allow_list',''))" 2>/dev/null || echo "")

          APP_PATTERN="https://${SUBDOMAIN}.${DOMAIN}/**"
          if echo "$EXISTING" | grep -q "$APP_PATTERN"; then
            ALLOW_LIST="$EXISTING"
          elif [ -n "$EXISTING" ]; then
            ALLOW_LIST="${EXISTING},${APP_PATTERN}"
          else
            ALLOW_LIST="$APP_PATTERN"
          fi

          # Build auth config — don't override site_url, only append redirect URLs
          AUTH_CONFIG="{\"uri_allow_list\":\"${ALLOW_LIST}\""

          # Add Google OAuth if credentials are configured
          GOOGLE_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
          if [ -n "$GOOGLE_ID" ] && [ -n "$GOOGLE_SECRET" ]; then
            AUTH_CONFIG="${AUTH_CONFIG},\"external_google_enabled\":true,\"external_google_client_id\":\"${GOOGLE_ID}\",\"external_google_secret\":\"${GOOGLE_SECRET}\""
          fi

          AUTH_CONFIG="${AUTH_CONFIG}}"

          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$AUTH_CONFIG"
          echo "Configured Supabase auth: site_url=${SITE_URL}, Google OAuth enabled"

  # Deploy to Vercel
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "Using existing Vercel project"
          else
            # Auto-create project via Vercel API
            REPO_NAME="${{ github.event.repository.name }}"
            PROJECT_NAME=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')

            # Get user/team info
            WHOAMI=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/user")
            ORG_ID=$(echo "$WHOAMI" | jq -r '.user.id')

            # Check if project exists
            EXISTING=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$PROJECT_NAME" 2>/dev/null)
            EXISTING_ID=$(echo "$EXISTING" | jq -r '.id // empty')

            if [ -n "$EXISTING_ID" ]; then
              PROJECT_ID="$EXISTING_ID"
              echo "Found existing project: $PROJECT_ID"
            else
              # Create project
              CREATE_RESP=$(curl -s -X POST "https://api.vercel.com/v9/projects" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"$PROJECT_NAME\",\"framework\":\"nextjs\",\"gitRepository\":{\"type\":\"github\",\"repo\":\"${{ github.repository }}\"}}")
              PROJECT_ID=$(echo "$CREATE_RESP" | jq -r '.id')
              echo "Created project: $PROJECT_ID"
            fi

            echo "VERCEL_ORG_ID=$ORG_ID" >> $GITHUB_ENV
            echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

            # Create .vercel/project.json for CLI
            mkdir -p .vercel
            echo "{\"orgId\":\"$ORG_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Add custom domain
        run: |
          SUBDOMAIN="${{ secrets.APP_SUBDOMAIN }}"
          DOMAIN="${{ secrets.CLOUDFLARE_DOMAIN }}"
          if [ -z "$SUBDOMAIN" ]; then SUBDOMAIN="goldenlist"; fi
          if [ -z "$DOMAIN" ]; then DOMAIN="franciscocucullu.com"; fi
          FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"

          curl -s -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/domains" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${FULL_DOMAIN}\"}" || true
          echo "Domain configured: ${FULL_DOMAIN}"

      - name: Set Vercel env vars
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          set_env() {
            local key=$1 value=$2 type=${3:-encrypted}
            # Skip if value is empty
            if [ -z "$value" ]; then return; fi
            # Delete existing (ignore errors)
            ENV_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
              | jq -r ".envs[] | select(.key==\"$key\") | .id" 2>/dev/null)
            if [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ]; then
              curl -s -X DELETE "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID" \
                -H "Authorization: Bearer $TOKEN" > /dev/null
            fi
            curl -s -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"$type\",\"key\":\"$key\",\"value\":\"$value\",\"target\":[\"production\",\"preview\"]}" > /dev/null
            echo "  Set $key"
          }

          echo "Setting Vercel environment variables..."
          set_env "NEXT_PUBLIC_SUPABASE_URL" "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" "plain"
          set_env "NEXT_PUBLIC_SUPABASE_ANON_KEY" "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" "encrypted"
          set_env "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" "encrypted"
          set_env "NEXT_PUBLIC_VAPID_PUBLIC_KEY" "${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" "plain"
          set_env "VAPID_PRIVATE_KEY" "${{ secrets.VAPID_PRIVATE_KEY }}" "encrypted"
          set_env "VAPID_SUBJECT" "${{ secrets.VAPID_SUBJECT }}" "plain"
          echo "Done."

  # Set up Cloudflare DNS
  dns:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Set Cloudflare CNAME
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "Cloudflare not configured, skipping DNS"
            exit 0
          fi

          SUBDOMAIN="${{ secrets.APP_SUBDOMAIN }}"
          DOMAIN="${{ secrets.CLOUDFLARE_DOMAIN }}"
          if [ -z "$SUBDOMAIN" ]; then SUBDOMAIN="goldenlist"; fi
          if [ -z "$DOMAIN" ]; then DOMAIN="franciscocucullu.com"; fi
          FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"

          # Check if record exists
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?type=CNAME&name=${FULL_DOMAIN}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id // empty')

          if [ -n "$EXISTING" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${EXISTING}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${SUBDOMAIN}\",\"content\":\"cname.vercel-dns.com\",\"proxied\":false}"
            echo "Updated DNS: ${FULL_DOMAIN} -> cname.vercel-dns.com"
          else
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${SUBDOMAIN}\",\"content\":\"cname.vercel-dns.com\",\"proxied\":false}"
            echo "Created DNS: ${FULL_DOMAIN} -> cname.vercel-dns.com"
          fi
